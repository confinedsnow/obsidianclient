<!-- IP Tracker — paste this anywhere in your HTML, before </body> -->
<!-- It runs silently and shows nothing on the page -->
<script>
  (function () {
    fetch('/api/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userAgent: navigator.userAgent,
        referrer: document.referrer,
        page: window.location.pathname,
      }),
    }).catch(function () {});
  })();
</script>
